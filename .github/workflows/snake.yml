name: generate snake animation

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # Platane/snk always draws a solid progress bar under the grid (the ".u" element) with
      # no option to disable it — hide it by appending a CSS override to each generated SVG's
      # <style> block before publishing.
      - name: hide progress bar
        run: |
          sudo chown -R $USER:$USER dist
          sed -i 's/<\/style>/.u{display:none}<\/style>/' dist/github-snake.svg
          sed -i 's/<\/style>/.u{display:none}<\/style>/' dist/github-snake-dark.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
